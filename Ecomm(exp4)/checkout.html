<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delivery Details</title>
<link rel="stylesheet" href="style.css">
<style>
.checkout-note {
    margin-bottom: 18px;
}
</style>
</head>
<body>

<header class="site-header">
<h1>Checkout</h1>
<p>Complete your delivery details</p>
</header>

<nav>
<div class="nav-shell">
<strong>ProSport</strong>
<ul>
<li><a href="index.html">Home</a></li>
<li><a href="cart.html">Cart</a></li>
</ul>
</div>
</nav>

<main>
<section class="panel checkout-note">
<span class="badge" style="background: #ffe5d6;">Delivery Form</span>
<p class="muted" style="margin-top: 12px;">A styled checkout form included as part of the static e-commerce flow.</p>
</section>

<section class="form-panel">
<form class="form-grid">
<div class="form-group">
<label for="fullName">Full Name</label>
<input type="text" id="fullName" name="fullName" required>
</div>

<div class="form-group">
<label for="phone">Phone</label>
<input type="tel" id="phone" name="phone" required>
</div>

<div class="form-group full">
<label for="address">Address</label>
<textarea id="address" name="address" required></textarea>
</div>

<div class="form-group">
<label for="city">City</label>
<input type="text" id="city" name="city" required>
</div>

<div class="form-group">
<label for="pincode">Pincode</label>
<input type="text" id="pincode" name="pincode" required>
</div>

<div class="form-group full">
<button class="cart-btn" type="submit">Place Order</button>
</div>
</form>
</section>
</main>
</body>
</html>
