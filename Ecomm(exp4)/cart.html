<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Cart</title>
<link rel="stylesheet" href="style.css">
<style>
.cart-note {
    margin-bottom: 18px;
}
</style>
</head>
<body>

<header class="site-header">
<h1>Shopping Cart</h1>
<p>Review your selected products</p>
</header>

<nav>
<div class="nav-shell">
<strong>ProSport</strong>
<ul>
<li><a href="index.html">Home</a></li>
<li><a href="checkout.html">Checkout</a></li>
</ul>
</div>
</nav>

<main>
<section class="panel cart-note">
<span class="badge" style="background: #ffe5d6;">Cart Summary</span>
<p class="muted" style="margin-top: 12px;">Static cart data prepared for the checkout workflow.</p>
</section>

<section class="table-panel">
<table>
<thead>
<tr>
<th>Product</th>
<th>Price</th>
<th>Qty</th>
<th>Total</th>
</tr>
</thead>
<tbody>
<tr>
<td>Football Studs</td>
<td>Rs. 4,999</td>
<td>1</td>
<td>Rs. 4,999</td>
</tr>
<tr>
<td>Cricket Bat</td>
<td>Rs. 12,999</td>
<td>1</td>
<td>Rs. 12,999</td>
</tr>
</tbody>
</table>

<div class="total-box">
<h3>Total: Rs. 17,998</h3>
<a class="button" href="checkout.html">Proceed to Checkout</a>
</div>
</section>
</main>
</body>
</html>
